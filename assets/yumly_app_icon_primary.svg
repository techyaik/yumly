<svg width="200" height="200" viewBox="60 40 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="icon1"><rect x="60" y="40" width="200" height="200" rx="46"/></clipPath>
    <radialGradient id="goldGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFCA6B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eggYolk" cx="42%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C47D0E"/>
    </radialGradient>
    <radialGradient id="eggWhite" cx="46%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#FFFFF8"/>
      <stop offset="100%" stop-color="#F0ECD8"/>
    </radialGradient>
    <radialGradient id="panSurface" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A2520"/>
      <stop offset="100%" stop-color="#1A1510"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="60" y="40" width="200" height="200" rx="46" fill="#0D0D0D"/>

  <g clip-path="url(#icon1)">
    <rect x="60" y="40" width="200" height="200" rx="46" fill="#0D0D0D"/>
    <ellipse cx="160" cy="140" rx="95" ry="90" fill="url(#goldGlow)"/>
    <line x1="60" y1="100" x2="260" y2="100" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="60" y1="160" x2="260" y2="160" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="60" y1="220" x2="260" y2="220" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="120" y1="40" x2="120" y2="240" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="180" y1="40" x2="180" y2="240" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="240" y1="40" x2="240" y2="240" stroke="#F5A623" stroke-opacity="0.05" stroke-width="0.5"/>

    <!-- frying pan -->
    <ellipse cx="158" cy="148" rx="68" ry="66" fill="url(#panSurface)" stroke="#3A3028" stroke-width="1.5"/>
    <ellipse cx="157" cy="146" rx="68" ry="65" fill="none" stroke="#4A3F30" stroke-width="1"/>
    <ellipse cx="158" cy="150" rx="58" ry="56" fill="#141210" stroke="#252015" stroke-width="1"/>
    <!-- egg white -->
    <ellipse cx="158" cy="150" rx="44" ry="40" fill="url(#eggWhite)"/>
    <ellipse cx="147" cy="160" rx="18" ry="12" fill="#FFFFF6" fill-opacity="0.6"/>
    <ellipse cx="172" cy="142" rx="14" ry="9" fill="#FFFFF6" fill-opacity="0.5"/>
    <!-- yolk -->
    <ellipse cx="158" cy="146" rx="20" ry="19" fill="url(#eggYolk)"/>
    <ellipse cx="152" cy="140" rx="6" ry="5" fill="#FFE88A" fill-opacity="0.7"/>
    <!-- handle -->
    <rect x="218" y="144" width="52" height="16" rx="8" fill="#2A2218" stroke="#3A3028" stroke-width="1"/>
    <rect x="220" y="147" width="46" height="10" rx="5" fill="#1E1A12"/>
    <!-- steam -->
    <path d="M140 104 Q136 96 140 88 Q144 80 140 72" fill="none" stroke="#F5A623" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
    <path d="M158 100 Q154 91 158 82 Q162 73 158 64" fill="none" stroke="#F5A623" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
    <path d="M176 104 Q172 95 176 86 Q180 77 176 68" fill="none" stroke="#F5A623" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round"/>

    <!-- wordmark — yumly -->
    <rect x="60" y="206" width="200" height="34" fill="#0D0D0D" fill-opacity="0.9"/>
    <text x="160" y="229" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold" font-style="italic" fill="#F5A623" letter-spacing="2">yumly</text>
  </g>
  <rect x="60" y="40" width="200" height="200" rx="46" fill="none" stroke="#2A2520" stroke-width="1.5"/>
</svg>
